<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>极境知源 | 沧海遗珠</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

  <!-- Theme: Simple -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
  <link rel="stylesheet" href="https://unpkg.com/docsify-copy-code@2/styles.css" />
  <style>
    .root, .suffix, .prefix, .end, .gray, .lumegreen,
    .titianred, .marrsgreen, .marrsgreen, .kleinblue{
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      margin-right: 2px;
      font-weight: bold;
    }

    .root   { background: #f4bc048b; }
    .suffix { background: #74b9ff; }
    .prefix { background: #92e908; }
    .end    { background: #e908b84d; }
    .gray    { background: #817b807d; }

    .lumegreen { background: #6ECC54; }
    .titianred { background: #D34947; }
    .marrsgreen { background: #018B8D; }
    .kleinblue { background: #002FA7; }


/* 勃艮第红 | BURGUNDY RED | #470125
申布伦黄 | SCHONBRUNNER GELB | #F9D46C
蒂芙尼蓝 | TIFFANY BLUE | #71E2D1
中国红 | CHINESE RED |#C8161D
凡戴克棕 | VANDYKE BROWN | #492D22
爱马仕橙 | HERMES ORANGE | #EB5C20
普鲁士蓝| PRUSSIAN BLUE | #0D3A69 */

  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false, // 修改为 false，显示文档内容
      copyCode: {
        buttonText: 'copy',
        successText: 'success',
        errorText: ''
      },
    };
  </script>

  <!-- 先加载插件 -->
  <script src="https://unpkg.com/docsify-copy-code@2"></script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
  window.$docsify.plugins = [].concat(
    window.$docsify.plugins || [],
    function (hook) {
      hook.afterEach(function (html) {
        return html
         // ===== 普通文本 =====
         .replace(/\[([^\]]+)\]\{r\}/g, '<span class="root">$1</span>')
         .replace(/\[([^\]]+)\]\{p\}/g, '<span class="prefix">$1</span>')
         .replace(/\[([^\]]+)\]\{s\}/g, '<span class="suffix">$1</span>')
         .replace(/\[([^\]]+)\]\{e\}/g, '<span class="end">$1</span>')
         .replace(/\[([^\]]+)\]\{g\}/g, '<span class="gray">$1</span>')

         .replace(/\[([^\]]+)\]\{l\}/g, '<span class="lumegreen">$1</span>')
         .replace(/\[([^\]]+)\]\{t\}/g, '<span class="titianred">$1</span>')
         .replace(/\[([^\]]+)\]\{m\}/g, '<span class="marrsgreen">$1</span>')
         .replace(/\[([^\]]+)\]\{k\}/g, '<span class="kleinblue">$1</span>')
      });
  });
  </script>
</body>
</html>
